[keepalived]
# VirtualBox port-forwarded SSH (see `vagrant ssh-config`)
vm1 ansible_host=127.0.0.1 ansible_port=2222 ansible_ssh_private_key_file=../.vagrant/machines/vm1/virtualbox/private_key
vm2 ansible_host=127.0.0.1 ansible_port=2200 ansible_ssh_private_key_file=../.vagrant/machines/vm2/virtualbox/private_key

[keepalived:vars]
ansible_user=vagrant
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa

